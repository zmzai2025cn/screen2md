# Screen2MD Enterprise - Docker Compose
# 本地开发环境配置

version: '3.8'

services:
  # 主应用服务
  screen2md:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: screen2md-app
    restart: unless-stopped
    volumes:
      - ./data/captures:/data/captures
      - ./data/index:/data/index
      - ./data/config:/data/config
      - ./logs:/app/logs
    environment:
      - Screen2MD__Capture__OutputDirectory=/data/captures
      - Screen2MD__Storage__MaxStorageGB=10
      - Screen2MD__Log__Level=Information
      - DOTNET_EnableDiagnostics=0
    # 特权模式（如果需要访问硬件）
    # privileged: true
    # devices:
    #   - /dev/video0:/dev/video0
    networks:
      - screen2md-network

  # 可选：监控服务（Prometheus + Grafana）
  prometheus:
    image: prom/prometheus:latest
    container_name: screen2md-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - screen2md-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: screen2md-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - screen2md-network
    profiles:
      - monitoring

  # 可选：ELK日志收集
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: screen2md-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - screen2md-network
    profiles:
      - logging

  logstash:
    image: logstash:8.11.0
    container_name: screen2md-logstash
    restart: unless-stopped
    volumes:
      - ./logging/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
      - ./logs:/logs
    depends_on:
      - elasticsearch
    networks:
      - screen2md-network
    profiles:
      - logging

  kibana:
    image: kibana:8.11.0
    container_name: screen2md-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - screen2md-network
    profiles:
      - logging

networks:
  screen2md-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  elasticsearch-data:
